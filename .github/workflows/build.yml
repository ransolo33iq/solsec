name: Build Solsec

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: bun run --cwd packages/opencode build -- --single --baseline --skip-embed-web-ui

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: solsec-linux-x64
          path: packages/opencode/dist/solsec-linux-x64-baseline/bin/opencode
          retention-days: 90
